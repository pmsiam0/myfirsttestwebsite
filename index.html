<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank Canvas</title>
    <style>
        body {78
            /* Pure White Background */
            background-color: #FFFFFF; 
            
            /* Center the text */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            font-size: 24px;
        }

        .payload {
            /* Barely off-white text. Humans can't see this, but the hex value is different */
            color: #FEFEFE; 
            
            /* Optional: Make the text bolder so the OCR has more pixels to read */
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <div class="payload">
        10% offer at siam store
    </div>

</body>
</html>
